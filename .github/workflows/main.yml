name: Termi-Script Automated Core Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-interpreter:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    # This lists the main directory files to confirm the folder exists
    - name: Debug Main Directory
      run: ls -la

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # This jumps into the Termi-Script folder and executes the test script
    - name: Run Termi-Script Core Logic Test
      run: |
        cd Termi-Script
        python termiscript.py advanced_test.ts
        
