name: Termi-Script Automated Core Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-interpreter:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    # This step lists files so you can visually see where they are in the logs
    - name: Debug File Locations
      run: ls -la

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Termi-Script Core Logic Test
      run: |
        python ${{ github.workspace }}/termiscript.py ${{ github.workspace }}/advanced_test.ts
        
